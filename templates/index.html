<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QR Code Generator - Buat QR Code dari link dengan mudah dan cepat">
    <title>QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Animated background blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2.5"/>
                    <rect x="5" y="5" width="8" height="8" rx="1" fill="currentColor"/>
                    <rect x="24" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2.5"/>
                    <rect x="27" y="5" width="8" height="8" rx="1" fill="currentColor"/>
                    <rect x="2" y="24" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2.5"/>
                    <rect x="5" y="27" width="8" height="8" rx="1" fill="currentColor"/>
                    <rect x="24" y="24" width="5" height="5" rx="1" fill="currentColor"/>
                    <rect x="33" y="24" width="5" height="5" rx="1" fill="currentColor"/>
                    <rect x="24" y="33" width="5" height="5" rx="1" fill="currentColor"/>
                    <rect x="33" y="33" width="5" height="5" rx="1" fill="currentColor"/>
                    <rect x="28.5" y="28.5" width="3" height="3" rx="0.5" fill="currentColor"/>
                </svg>
                <h1>QR Generator</h1>
            </div>
            <p class="subtitle">Ubah link menjadi QR Code dengan instan</p>
        </header>

        <!-- Main Card -->
        <div class="card">
            <!-- Input Section -->
            <div class="input-section">
                <label for="url-input" class="input-label">Masukkan Link / URL</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <input
                        type="url"
                        id="url-input"
                        placeholder="https://contoh.com"
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>
            </div>

            <!-- Color Customization -->
            <div class="color-section">
                <div class="color-group">
                    <label for="fill-color" class="color-label">Warna QR</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="fill-color" value="#000000">
                        <span class="color-value" id="fill-color-value">#000000</span>
                    </div>
                </div>
                <div class="color-group">
                    <label for="bg-color" class="color-label">Warna Latar</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="bg-color" value="#ffffff">
                        <span class="color-value" id="bg-color-value">#ffffff</span>
                    </div>
                </div>
            </div>

            <!-- Generate Button -->
            <button id="generate-btn" type="button">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 16 12 12 8 16"/>
                    <line x1="12" y1="12" x2="12" y2="21"/>
                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                </svg>
                <span>Generate QR Code</span>
                <div class="btn-shimmer"></div>
            </button>

            <!-- Loading -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <span>Membuat QR Code...</span>
            </div>

            <!-- Error -->
            <div id="error-msg" class="error-msg hidden"></div>

            <!-- Result Section -->
            <div id="result-section" class="result-section hidden">
                <div class="qr-display">
                    <div class="qr-frame">
                        <img id="qr-image" alt="QR Code" />
                    </div>
                </div>
                <div class="result-actions">
                    <button id="download-btn" class="action-btn download-btn" type="button">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>Download PNG</span>
                    </button>
                    <button id="copy-btn" class="action-btn copy-btn" type="button">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        <span>Copy Image</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Dibuat dengan <span class="heart">♥</span> menggunakan Python & Flask</p>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
